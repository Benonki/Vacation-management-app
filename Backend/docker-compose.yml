services:
  postgres:
    image: postgres:16
    container_name: vacation-db
    environment:
      POSTGRES_DB: vacation_db
      POSTGRES_USER: vacation_user
      POSTGRES_PASSWORD: vacation_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: vacation-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vacation_db
      SPRING_DATASOURCE_USERNAME: vacation_user
      SPRING_DATASOURCE_PASSWORD: vacation_pass
      JWT_SECRET: JWTSECRETKEYFORTESTINGONLY12345678
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres

volumes:
  postgres_data: